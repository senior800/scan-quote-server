name: base
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pythonocc-core=7.8.1.1   # OpenCascade Python bindings (STEP). conda-forge only.
  - trimesh>=4.0             # STL mesh analysis
  - numpy
  - scipy
  - networkx                 # required by trimesh.split()
  - rtree                    # spatial index (trimesh)
  - fastapi
  - uvicorn
  - python-multipart         # FastAPI file uploads
